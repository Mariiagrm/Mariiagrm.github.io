<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Seleccionamos todos los enlaces de la página que no se abran en una pestaña nueva
        const links = document.querySelectorAll('a[href]:not([target="_blank"])');
        
        links.forEach(link => {
            link.addEventListener('click', function(e) {
                const targetUrl = this.getAttribute('href');

                // Si el enlace es solo un '#' (como los botones sin ruta aún), no hacemos nada
                if (targetUrl === '#' || targetUrl.startsWith('#')) return;
                
                // 1. Evitamos que la página cambie de golpe
                e.preventDefault();

                // 2. Le añadimos al body la clase para que se desvanezca hacia abajo
                document.body.classList.add('page-exit');

                // 3. Esperamos 500 milisegundos (0.5s) a que termine la animación y entonces cambiamos de URL
                setTimeout(() => {
                    window.location.href = this.href;
                }, 500);
            });
        });
    });
</script>
